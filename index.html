<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速 AI 營養標示輸入 (V3)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .is-warning { background-color: #fee2e2; border: 2px solid #ef4444 !important; }
        .is-estimated { background-color: #f5f3ff; color: #7c3aed; font-weight: bold; border: 2px solid #ddd6fe !important; }
        input, select { transition: all 0.2s; border: 1px solid #e2e8f0; }
        input:focus, select:focus { background-color: #fff7ed; border-color: #fb923c; outline: none; box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.2); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="app" class="p-4 max-w-[1600px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">AI 營養辨識系統 <span class="text-blue-600 text-lg">V3</span></h1>
                <p class="text-slate-500 font-medium mt-1">針對台灣超商標示優化 | 自動計算總量 | 纖維推估</p>
            </div>
            
            <div class="flex flex-col items-end gap-3 mt-4 md:mt-0">
                <div class="flex flex-col md:flex-row items-stretch md:items-center gap-3 w-full md:w-auto">
                    <div class="flex flex-col gap-2 relative group z-50">
                        <input type="password" 
                               v-model="customApiKey" 
                               @change="saveSettings" 
                               placeholder="貼上個人 API Key" 
                               class="text-xs p-2 rounded-lg border border-slate-300 w-full md:w-56 bg-slate-50 focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all outline-none">
                        
                        <input type="text" 
                               v-model="customScriptUrl" 
                               @change="saveSettings" 
                               placeholder="貼上 Apps Script 網址" 
                               class="text-xs p-2 rounded-lg border border-slate-300 w-full md:w-56 bg-slate-50 focus:bg-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-200 transition-all outline-none">
                               
                        <div class="absolute -bottom-10 right-0 bg-slate-800 text-white text-[11px] px-3 py-2 rounded hidden group-hover:block whitespace-nowrap shadow-lg">
                            金鑰會存在你的瀏覽器，不會外洩
                        </div>
                    </div>
                    
                    <button @click="exportToSheet" 
                            :disabled="isExporting" 
                            class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-emerald-400 text-white px-6 py-2 md:py-0 rounded-xl font-bold shadow-lg shadow-emerald-100 transition-all transform hover:-translate-y-1 text-sm whitespace-nowrap flex items-center justify-center min-w-[140px] h-full min-h-[40px]">
                        {{ isExporting ? '努力傳送中...' : '一鍵同步至 Google' }}
                    </button>
                </div>
                
                <div class="bg-slate-100 px-4 py-1.5 rounded-lg text-center flex items-center justify-center gap-2 w-full md:w-auto">
                    <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">目前進度</span>
                    <span class="font-black text-lg text-blue-600">{{ finishedCount }} / {{ images.length }}</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-4">
                <div class="border-4 border-dashed border-slate-200 rounded-3xl p-10 text-center bg-white hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer group"
                     @click="$refs.fileInput.click()">
                    <input type="file" ref="fileInput" multiple accept="image/*" class="hidden" @change="handleUpload">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📸</div>
                    <p class="font-bold text-slate-700">批次上傳照片</p>
                    <p class="text-xs text-slate-400 mt-1">支援拖放多張圖片</p>
                </div>

                <div class="grid grid-cols-2 gap-3 overflow-y-auto max-h-[600px] p-1">
                    <div v-for="(img, idx) in images" :key="idx" 
                         @click="selectedIdx = idx"
                         :class="['relative cursor-pointer rounded-2xl border-4 overflow-hidden shadow-sm transition-all', selectedIdx === idx ? 'border-blue-500 scale-95 ring-4 ring-blue-100' : 'border-white']">
                        <img :src="img.url" class="w-full h-32 object-cover">
                        <div v-if="results[idx]?.status === 'processing'" class="absolute inset-0 bg-white/80 flex flex-col items-center justify-center">
                            <div class="loading-spinner mb-2"></div>
                            <span class="text-[10px] font-bold text-blue-600 uppercase mt-2">辨識中</span>
                        </div>
                        <div v-if="results[idx]?.status === 'error'" class="absolute inset-0 bg-red-50/90 flex flex-col items-center justify-center p-2 text-center">
                            <span class="text-[10px] font-bold text-red-600 leading-tight">辨識失敗</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-x-auto">
                    <table class="w-full text-sm min-w-[1050px]">
                        <thead>
                            <tr class="bg-slate-900 text-slate-300 text-[11px] uppercase tracking-wider">
                                <th class="p-4 text-left font-bold w-48">品項名稱 / 錯誤訊息</th>
                                <th class="p-4 w-28 text-center">類別</th>
                                <th class="p-4 w-16 text-center">價格</th>
                                <th class="p-4 w-16 text-center">份數</th>
                                <th class="p-4 w-20 text-center text-white">總熱量</th>
                                <th class="p-4 w-16 text-center">蛋白質</th>
                                <th class="p-1 w-16 text-center text-white">淨重(g)</th>
                                <th class="p-4 w-16 text-center text-white">脂肪</th>
                                <th class="p-4 w-16 text-center text-white">碳水</th>
                                <th class="p-4 w-16 text-center">鈉</th>
                                <th class="p-4 w-24 text-center">蔬菜推估</th>
                                <th class="p-4 w-16 text-center text-purple-300">纖維</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr v-for="(item, idx) in results" :key="idx" 
                                @click="selectedIdx = idx"
                                :class="['transition-colors', selectedIdx === idx ? 'bg-blue-50/50' : 'hover:bg-slate-50']">
                                <td class="p-2">
                                    <input v-if="item.status !== 'error'" v-model="item.name" class="w-full p-2 bg-white rounded-lg border-transparent hover:border-slate-200">
                                    <div v-else class="w-full p-2 bg-red-50 rounded-lg text-red-600 text-xs font-bold leading-tight break-all">
                                        {{ item.errorMsg }}
                                    </div>
                                </td>
                                <td class="p-2">
                                    <select v-model="item.category" class="w-full p-2 bg-white rounded-lg text-xs" :disabled="item.status === 'error'">
                                        <option value="飯/便當類">飯/便當類</option>
                                        <option value="麵食類">麵食類</option>
                                        <option value="沙拉/輕食">沙拉/輕食</option>
                                        <option value="飲料">飲料</option>
                                        <option value="點心/零食">點心/零食</option>
                                        <option value="其他">其他</option>
                                    </select>
                                </td>
                                <td class="p-2 text-center"><input v-model.number="item.price" placeholder="$" class="w-full p-2 text-center bg-white rounded-lg" :disabled="item.status === 'error'"></td>
                                <td class="p-2 text-center"><input v-model.number="item.portions" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg font-bold" :disabled="item.status === 'error'"></td>
                                <td class="p-2"><input v-model.number="item.calories" class="w-full p-2 text-center bg-white rounded-lg font-black text-orange-600" :class="{'is-warning': item.calError}" :disabled="item.status === 'error'"></td>
                                <td class="p-2"><input v-model.number="item.protein" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg" :disabled="item.status === 'error'"></td>
                                <td class="p-2"><input v-model.number="item.netWeight" @input="reCalc(idx)" class="w-full p-2 text-center bg-slate-100 rounded-lg font-bold" :disabled="item.status === 'error'"></td>
                                <td class="p-2"><input v-model.number="item.fat" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg" :disabled="item.status === 'error'"></td>
                                <td class="p-2"><input v-model.number="item.carbs" @input="reCalc(idx)" class="w-full p-2 text-center bg-white rounded-lg" :disabled="item.status === 'error'"></td>
                                <td class="p-2"><input v-model.number="item.sodium" class="w-full p-2 text-center bg-white rounded-lg text-blue-600" :disabled="item.status === 'error'"></td>
                                <td class="p-2">
                                    <select v-model="item.vegType" @change="reCalc(idx)" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600" :disabled="item.status === 'error'">
                                        <option value="none">標示已有</option>
                                        <option value="raw">生菜(2%)</option>
                                        <option value="cooked">熟菜(3%)</option>
                                    </select>
                                </td>
                                <td class="p-2">
                                    <input v-model.number="item.fiber" class="w-full p-2 text-center bg-white rounded-lg font-black text-purple-600 border-2" :class="{'is-estimated': item.fiberEstimated}" :disabled="item.status === 'error'">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-if="results.length === 0" class="p-24 text-center">
                        <div class="text-6xl mb-4 opacity-20">📊</div>
                        <p class="text-slate-400 font-medium text-lg">上傳營養標示照片後，數據將在此呈現</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const apiKey = ""; 
                
                // 這裡把金鑰預設值清空，確保不會再上傳外洩
                const customApiKey = ref(localStorage.getItem('gemini_api_key') || '');
                const customScriptUrl = ref(localStorage.getItem('gemini_script_url') || 'https://script.google.com/macros/s/AKfycbzAN311kTYImaJlad5w_CH6U8IGzJ1nknCDj6uuZvToczWlcCOhBmGEQNkdfabq2exi/exec');
                const isExporting = ref(false);

                const saveSettings = () => {
                    localStorage.setItem('gemini_api_key', customApiKey.value);
                    localStorage.setItem('gemini_script_url', customScriptUrl.value);
                };

                const images = ref([]);
                const results = ref([]);
                const selectedIdx = ref(null);

                const finishedCount = computed(() => results.value.filter(r => r.status === 'done' || r.status === 'error').length);

                const handleUpload = (e) => {
                    const files = Array.from(e.target.files);
                    files.forEach(file => {
                        const url = URL.createObjectURL(file);
                        const idx = images.value.length;
                        images.value.push({ url, file });
                        results.value.push({ 
                            name: '讀取中...', category: '其他', price: '', portions: 1, netWeight: 0, calories: 0, 
                            protein: 0, fat: 0, carbs: 0, sodium: 0, fiber: 0, 
                            status: 'processing', vegType: 'none', fiberEstimated: false,
                            errorMsg: ''
                        });
                        processImage(file, idx);
                    });
                };

                const compressImage = (file) => {
                    return new Promise((resolve, reject) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const maxSize = 1024;
                            
                            if (width > height && width > maxSize) {
                                height *= maxSize / width;
                                width = maxSize;
                            } else if (height > maxSize) {
                                width *= maxSize / height;
                                height = maxSize;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        };
                        img.onerror = reject;
                        img.src = URL.createObjectURL(file);
                    });
                };

                const fetchWithBackoff = async (url, options, retries = 3) => {
                    let delay = 1500;
                    for (let i = 0; i < retries; i++) {
                        try {
                            const response = await fetch(url, options);
                            const result = await response.json();
                            if (response.ok) return result;
                            if (i === retries - 1) {
                                throw new Error(result.error?.message || `HTTP ${response.status}`);
                            }
                        } catch (err) {
                            if (i === retries - 1) throw err;
                        }
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                };

                const processImage = async (file, index) => {
                    try {
                        const base64Data = await compressImage(file);

                        const prompt = `你是一位專業的台灣食品營養標示判讀專家。請仔細讀取圖片。
                        
                        判讀邏輯：
                        1. 品項名稱：從包裝正面或側面的大字提取。
                        2. 份量判讀：優先尋找「每一份量」以及「本包裝含X份」。
                        3. 台灣標示慣例：通常表格有兩欄，左欄是「每份」，右欄是「每 100 公克/毫升」。請務必抓取「每份」欄位的數據。
                        4. 淨重：從包裝上的「淨重」或內容物描述提取總重量。
                        5. 輸出數值：
                           - 如果只有每 100g 數據，請根據淨重換算出總份量的數據。
                           - 所有營養素回傳該品項「整包裝」的總量。
                        6. 根據產品推斷最合適的分類 (category)，只能從以下選項中擇一填入：'飯/便當類', '麵食類', '沙拉/輕食', '飲料', '點心/零食', '其他'。
                        
                        請回傳 JSON 格式。`;

                        const payload = {
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        name: { type: "STRING" },
                                        category: { type: "STRING" },
                                        portions: { type: "NUMBER" },
                                        netWeight: { type: "NUMBER" },
                                        total_calories: { type: "NUMBER" },
                                        total_protein: { type: "NUMBER" },
                                        total_fat: { type: "NUMBER" },
                                        total_carb: { type: "NUMBER" },
                                        total_sodium: { type: "NUMBER" },
                                        total_fiber: { type: "NUMBER" }
                                    },
                                    required: ["name", "category", "portions", "netWeight", "total_calories", "total_protein", "total_fat", "total_carb", "total_sodium", "total_fiber"]
                                }
                            },
                            contents: [{ 
                                role: "user",
                                parts: [
                                    { text: prompt }, 
                                    { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                                ] 
                            }]
                        };

                        let url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                        
                        if (customApiKey.value) {
                            url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${customApiKey.value}`;
                        } else if (!apiKey) {
                            throw new Error("請先在右上角填寫您的 API Key");
                        }

                        const data = await fetchWithBackoff(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const res = JSON.parse(data.candidates[0].content.parts[0].text);

                        results.value[index] = {
                            name: res.name || "未知名稱",
                            category: res.category || "其他",
                            price: '', 
                            portions: res.portions || 1,
                            netWeight: res.netWeight || 0,
                            calories: res.total_calories,
                            protein: res.total_protein.toFixed(1),
                            fat: res.total_fat.toFixed(1),
                            carbs: res.total_carb.toFixed(1),
                            sodium: res.total_sodium,
                            fiber: res.total_fiber || 0,
                            vegType: 'none',
                            status: 'done',
                            fiberEstimated: false,
                            calError: false,
                            errorMsg: ''
                        };
                        checkError(index);
                    } catch (err) {
                        console.error("解析錯誤詳情:", err);
                        results.value[index].name = "辨識失敗";
                        results.value[index].errorMsg = err.message || "網路錯誤或 API 阻擋";
                        results.value[index].status = "error";
                    }
                };

                const reCalc = (idx) => {
                    const item = results.value[idx];
                    if (item.status === 'error') return;
                    if (item.vegType === 'raw') {
                        item.fiber = parseFloat((item.netWeight * 0.02).toFixed(1));
                        item.fiberEstimated = true;
                    } else if (item.vegType === 'cooked') {
                        item.fiber = parseFloat((item.netWeight * 0.03).toFixed(1));
                        item.fiberEstimated = true;
                    } else {
                        item.fiberEstimated = false;
                    }
                    checkError(idx);
                };

                const checkError = (idx) => {
                    const item = results.value[idx];
                    if (item.status === 'error') return;
                    const calcCal = (item.protein * 4) + (item.carbs * 4) + (item.fat * 9);
                    item.calError = Math.abs(calcCal - item.calories) > (item.calories * 0.2);
                };

                const exportToSheet = async () => {
                    if (!customScriptUrl.value || !customScriptUrl.value.includes('exec')) {
                        alert('請先在畫面上方填寫正確的 Apps Script 網址喔！');
                        return;
                    }

                    const validData = results.value.filter(r => r.status === 'done' && r.name !== '讀取中...' && r.name !== '未知名稱');
                    
                    if (validData.length === 0) {
                        alert('目前沒有辨識成功的資料可以匯出喔！');
                        return;
                    }

                    isExporting.value = true;

                    try {
                        const response = await fetch(customScriptUrl.value, { 
                            method: 'POST', 
                            body: JSON.stringify(validData),
                            headers: {
                                'Content-Type': 'text/plain;charset=utf-8',
                            }
                        });
                        
                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            alert(`成功將 ${validData.length} 筆資料同步到 Google 試算表。`);
                        } else {
                            alert('發生了一點錯誤：' + result.message);
                        }
                    } catch (e) { 
                        console.error(e);
                        alert('同步失敗，請檢查網路連線或是 Apps Script 權限。'); 
                    } finally {
                        isExporting.value = false;
                    }
                };

                return { 
                    customApiKey, customScriptUrl, saveSettings, isExporting,
                    images, results, selectedIdx, finishedCount, 
                    handleUpload, reCalc, exportToSheet 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
