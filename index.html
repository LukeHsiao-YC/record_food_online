<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>7-11 健康選食助手 (雲端版) - 蕭宇超醫師製作</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心套件 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 Lucide Icons 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent; 
      touch-action: manipulation;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    input[type="text"], input[type="number"] {
      font-size: 16px !important; 
    }
    /* 讀取中動畫 */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #10b981;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // 1. API 網址設定
    // ==========================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzAN311kTYImaJlad5w_CH6U8IGzJ1nknCDj6uuZvToczWlcCOhBmGEQNkdfabq2exi/exec"; 

    // ==========================================
    // 2. 圖示與基礎元件設定
    // ==========================================
    const Icon = ({ name, className = "", ...props }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide) {
          lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            nameAttr: 'data-lucide',
            attrs: { class: className, ...props }
          });
        }
      }, [name, className, props]);
      return <i ref={iconRef} data-lucide={name}></i>;
    };

    const Search = (props) => <Icon name="search" {...props} />;
    const Plus = (props) => <Icon name="plus" {...props} />;
    const X = (props) => <Icon name="x" {...props} />;
    const AlertCircle = (props) => <Icon name="alert-circle" {...props} />;
    const CheckCircle2 = (props) => <Icon name="check-circle-2" {...props} />;
    const ChevronLeft = (props) => <Icon name="chevron-left" {...props} />;
    const ChevronRight = (props) => <Icon name="chevron-right" {...props} />;
    const ChevronDown = (props) => <Icon name="chevron-down" {...props} />;
    const ShoppingBag = (props) => <Icon name="shopping-bag" {...props} />;
    const Utensils = (props) => <Icon name="utensils" {...props} />;
    const Info = (props) => <Icon name="info" {...props} />;
    const Edit = (props) => <Icon name="edit" {...props} />;
    const Clock = (props) => <Icon name="clock" {...props} />;
    const ListFilter = (props) => <Icon name="list-filter" {...props} />;
    const AlertTriangle = (props) => <Icon name="alert-triangle" {...props} />;
    const CalendarDays = (props) => <Icon name="calendar-days" {...props} />;
    const Award = (props) => <Icon name="award" {...props} />;
    const TrendingUp = (props) => <Icon name="trending-up" {...props} />;
    const User = (props) => <Icon name="user" {...props} />;
    const Activity = (props) => <Icon name="activity" {...props} />;
    const Target = (props) => <Icon name="target" {...props} />;
    const Save = (props) => <Icon name="save" {...props} />;
    const Settings = (props) => <Icon name="settings" {...props} />;
    const Coffee = (props) => <Icon name="coffee" {...props} />;
    const PieChart = (props) => <Icon name="pie-chart" {...props} />;
    const HeartHandshake = (props) => <Icon name="heart-handshake" {...props} />;
    const RefreshCw = (props) => <Icon name="refresh-cw" {...props} />;
    const Zap = (props) => <Icon name="zap" {...props} />;

    const FacebookLogo = (props) => (
      <svg viewBox="0 0 24 24" fill="currentColor" {...props}>
        <path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/>
      </svg>
    );
    const InstagramLogo = (props) => (
      <svg viewBox="0 0 24 24" fill="currentColor" {...props}>
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 1.76-6.98 6.276-.058 1.281-.072 1.688-.072 4.947s.014 3.666.072 4.947c.2 4.515 2.622 6.076 6.98 6.276 1.28.058 1.687.072 4.947.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-1.76 6.979-6.276.059-1.281.073-1.689.073-4.947 0-3.259-.014-3.667-.072-4.947-.196-4.516-2.624-6.076-6.98-6.276C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
      </svg>
    );
    const LineLogo = (props) => (
      <svg viewBox="0 0 24 24" fill="currentColor" {...props}>
        <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 3.938 8.909 9.542 9.605.39.083.923.258 1.058.59.12.284.077.727.034 1.025l-.226 1.348c-.058.337-.272 1.332 1.171.729 1.443-.604 7.785-4.593 10.518-8.318C23.364 13.568 24 11.996 24 10.304zM7.221 12.981H5.372a.526.526 0 01-.527-.527V7.818c0-.291.236-.527.527-.527s.527.236.527.527v4.11h1.322c.291 0 .527.236.527.527s-.236.526-.527.526zm2.845 0h-.527a.526.526 0 01-.527-.527V7.818c0-.291.236-.527.527-.527s.527.236.527.527v4.636c0 .291-.236.527-.527.527zm3.87 0h-.441a.524.524 0 01-.453-.263l-1.921-3.137v2.873c0 .291-.236.527-.527.527s-.527-.236-.527-.527V7.818c0-.18.093-.347.242-.44.15-.091.337-.099.493-.016.037.019.07.043.101.074l1.921 3.137V7.818c0-.291.236-.527.527-.527s.527.236.527.527v4.636c0 .291-.236.527-.527.527zm3.966-2.915H16.06v1.336h1.842c.291 0 .527.236.527.527s-.236.527-.527.527h-2.369a.526.526 0 01-.527-.527V7.818c0-.291.236-.527.527-.527h2.369c.291 0 .527.236.527.527s-.236.527-.527.527H16.06v1.189h1.842c.291 0 .527.236.527.527s-.236.527-.527.527z"/>
      </svg>
    );

    function ChevronUp(props) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
          <path d="m18 15-6-6-6 6"/>
        </svg>
      );
    }

    // 智能短評生成器 (SOP 規則)
    const generateSmartComment = (carb, pro, sod, isMain) => {
      let comments = [];
      if (carb > 100) comments.push("白飯務必剩一半，否則易引起餐後嗜睡與脂肪囤積。");
      else if (carb > 80) comments.push("碳水偏高，建議白飯剩 1/3 不吃。");

      if (sod > 1300) comments.push("⚠️ 鈉量危險！餐後請多喝水 300-500cc 幫助代謝。");
      else if (sod > 1000) comments.push("鈉偏高，醬汁請勿全加，盡量不喝底湯。");

      if (isMain && pro < 15 && carb > 60) comments.push("蛋白質極度缺乏，餐後容易餓，強烈建議加購雞胸肉或茶葉蛋。");

      if (comments.length === 0) {
        return isMain ? "營養比例相對安全，請參考下方進度條補足缺口！" : "此單品負擔較小，是不錯的選擇！";
      }
      return comments.join(" ");
    };

    // ==========================================
    // 3. 引導設定元件 (OnboardingScreen)
    // ==========================================
    const OnboardingScreen = ({ onComplete }) => {
      const [step, setStep] = useState(1);
      const [profile, setProfile] = useState(() => {
        const saved = localStorage.getItem('health_select_profile');
        if (saved) {
          const parsed = JSON.parse(saved);
          return {
            ...parsed,
            dietType: parsed.dietType || 'standard',
            customMacros: parsed.customMacros || { pro: 25, carb: 25, veg: 50 }
          };
        }
        return {
          name: '', gender: 'female', age: 30, height: 160, weight: 65, activity: '1.2', goal: '0',
          dietType: 'standard', customMacros: { pro: 25, carb: 25, veg: 50 }
        };
      });

      const [tdee, setTdee] = useState(0);
      const [targetKcal, setTargetKcal] = useState(0);

      useEffect(() => {
        let bmr = 0;
        const age = parseInt(profile.age) || 0;
        const weight = parseFloat(profile.weight) || 0;
        const height = parseFloat(profile.height) || 0;

        if (age >= 19) {
          bmr = (10 * weight) + (6.25 * height) - (5 * age) + (profile.gender === 'male' ? 5 : -161);
        } else {
          if (profile.gender === 'male') {
            if (age < 10) bmr = (22.7 * weight) + 495;
            else bmr = (17.5 * weight) + 651;
          } else {
            if (age < 10) bmr = (22.5 * weight) + 499;
            else bmr = (12.2 * weight) + 746;
          }
        }

        const calculatedTdee = Math.round(bmr * parseFloat(profile.activity));
        setTdee(calculatedTdee);
        const dailyDeficit = (parseFloat(profile.goal) * 7700) / 7;
        setTargetKcal(Math.round(calculatedTdee - dailyDeficit));
      }, [profile]);

      const handleStart = () => {
        if (profile.dietType === 'custom') {
          const sum = parseFloat(profile.customMacros.pro) + parseFloat(profile.customMacros.carb) + parseFloat(profile.customMacros.veg);
          if (sum !== 100) {
            alert('自訂比例加總必須剛好等於 100% 喔！目前為：' + sum + '%');
            return;
          }
        }
        localStorage.setItem('health_select_profile', JSON.stringify(profile));
        onComplete();
      };

      const activityOptions = [
        { value: '1.2', label: '久坐/靜態', desc: '辦公室、教室內上課為主', icon: '💻' },
        { value: '1.375', label: '輕量活動', desc: '每週運動 1-3 天或常走路', icon: '🚶' },
        { value: '1.55', label: '中度活動', desc: '每週運動 3-5 天', icon: '🚴' },
        { value: '1.725', label: '重度活動', desc: '每週運動 6-7 天', icon: '🏃' },
      ];

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 font-sans text-slate-800 pb-10">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 mb-6 mt-4">
            <div className="bg-emerald-600 p-6 text-white">
              <h1 className="text-2xl font-bold flex items-center gap-2"><User className="w-6 h-6 mr-1" /> 健康選食助手設定</h1>
              <p className="text-emerald-50 opacity-90 text-sm mt-1">為您精準規劃專屬超商營養配額</p>
              <div className="flex gap-2 mt-6">
                {[1, 2, 3, 4].map((s) => (
                  <div key={s} className={`h-1.5 flex-1 rounded-full transition-all duration-300 ${s <= step ? 'bg-white' : 'bg-emerald-800/30'}`} />
                ))}
              </div>
            </div>

            <div className="p-8">
              {step === 1 && (
                <div className="space-y-6">
                  <div className="space-y-4">
                    <label className="block">
                      <span className="text-sm font-semibold text-slate-600">怎麼稱呼您？</span>
                      <input type="text" className="mt-1 block w-full text-base rounded-xl border-slate-200 bg-slate-50 p-3 outline-none focus:ring-2 focus:ring-emerald-500" placeholder="例如：小美" value={profile.name} onChange={(e) => setProfile({...profile, name: e.target.value})} />
                    </label>
                    <div className="grid grid-cols-2 gap-4">
                      <button onClick={() => setProfile({...profile, gender: 'male'})} className={`p-3 rounded-xl border-2 transition-all font-bold ${profile.gender === 'male' ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-100 text-slate-400'}`}>男性</button>
                      <button onClick={() => setProfile({...profile, gender: 'female'})} className={`p-3 rounded-xl border-2 transition-all font-bold ${profile.gender === 'female' ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-100 text-slate-400'}`}>女性</button>
                    </div>
                    <div className="grid grid-cols-3 gap-3">
                      <label className="block text-center"><span className="text-xs text-slate-500">年齡</span><input type="number" min="8" className="mt-1 w-full text-base text-center p-2 bg-slate-50 rounded-lg border-0 outline-none" value={profile.age} onChange={(e) => setProfile({...profile, age: e.target.value})}/></label>
                      <label className="block text-center"><span className="text-xs text-slate-500">身高(cm)</span><input type="number" className="mt-1 w-full text-base text-center p-2 bg-slate-50 rounded-lg border-0 outline-none" value={profile.height} onChange={(e) => setProfile({...profile, height: e.target.value})}/></label>
                      <label className="block text-center"><span className="text-xs text-slate-500">體重(kg)</span><input type="number" className="mt-1 w-full text-base text-center p-2 bg-slate-50 rounded-lg border-0 outline-none" value={profile.weight} onChange={(e) => setProfile({...profile, weight: e.target.value})}/></label>
                    </div>
                  </div>
                </div>
              )}

              {step === 2 && (
                <div className="space-y-4">
                  <h3 className="text-lg font-bold flex items-center gap-2"><Activity className="w-5 h-5 text-emerald-600 mr-1"/> 日常活動強度</h3>
                  <div className="space-y-2">
                    {activityOptions.map((opt) => (
                      <button key={opt.value} onClick={() => setProfile({...profile, activity: opt.value})} className={`w-full p-4 flex items-center gap-4 rounded-2xl border-2 text-left transition-all ${profile.activity === opt.value ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-50 hover:bg-slate-50'}`}>
                        <span className="text-3xl">{opt.icon}</span>
                        <div>
                          <div className="font-bold text-slate-700">{opt.label}</div>
                          <div className="text-xs text-slate-500">{opt.desc}</div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {step === 3 && (
                <div className="space-y-6 text-center">
                  <div className="bg-emerald-50 rounded-3xl p-6 border border-emerald-100">
                    <p className="text-emerald-700 text-sm font-semibold uppercase tracking-wider mb-2">專屬總熱量配額</p>
                    <div className="flex justify-around items-end">
                      <div>
                        <span className="text-xs text-slate-500 block">您的 TDEE</span>
                        <span className="text-xl font-bold text-slate-600">{tdee}</span><span className="text-xs text-slate-400"> kcal</span>
                      </div>
                      <div className="pb-2"><ChevronRight className="w-5 h-5 text-emerald-300" /></div>
                      <div>
                        <span className="text-xs text-emerald-600 block font-bold">每餐建議攝取</span>
                        <span className="text-3xl font-black text-emerald-700">{Math.round(targetKcal / 3)}</span><span className="text-xs text-emerald-600"> kcal</span>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-3 text-left">
                    <h3 className="text-sm font-bold flex items-center gap-2 px-1"><Target className="w-4 h-4 text-emerald-600"/> 健康管理目標</h3>
                    <div className="flex gap-2">
                      {[{ val: '0', label: '維持現況' }, { val: '0.3', label: '健康輕體' }, { val: '0.5', label: '積極管理' }].map((g) => (
                        <button key={g.val} onClick={() => setProfile({...profile, goal: g.val})} className={`flex-1 py-3 px-1 rounded-xl border text-sm font-bold transition-all ${profile.goal === g.val ? 'bg-emerald-600 text-white border-emerald-600 shadow-md' : 'border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                          {g.label}
                        </button>
                      ))}
                    </div>
                    
                    <div className="bg-slate-50 p-3 rounded-xl mt-3 text-[13px] text-slate-600 font-medium">
                      {profile.goal === '0' && <span className="flex items-start gap-1.5"><Info className="w-4 h-4 flex-shrink-0 text-slate-400 mt-0.5"/> 選擇維持現況，系統將不刻意製造熱量赤字，旨在維持現有體重與體態。</span>}
                      {profile.goal === '0.3' && <span className="flex items-start gap-1.5"><Info className="w-4 h-4 flex-shrink-0 text-blue-500 mt-0.5"/> 預估每週約減少 <b className="text-blue-600">0.3</b> 公斤。<br/>(每日需創造約 330 大卡的熱量赤字)</span>}
                      {profile.goal === '0.5' && <span className="flex items-start gap-1.5"><Info className="w-4 h-4 flex-shrink-0 text-orange-500 mt-0.5"/> 預估每週約減少 <b className="text-orange-600">0.5</b> 公斤。<br/>(每日需創造約 550 大卡的熱量赤字)</span>}
                    </div>

                    {parseInt(profile.age) < 18 && (
                      <p className="text-[10px] text-red-500 px-2 flex items-start gap-1 mt-2">
                        <AlertTriangle className="w-3 h-3 mt-0.5 flex-shrink-0" />
                        兒童與青少年建議以「維持體重」搭配運動為主，避免極端節食影響發育。
                      </p>
                    )}
                  </div>
                </div>
              )}

              {step === 4 && (
                <div className="space-y-5 text-left">
                  <h3 className="text-lg font-bold flex items-center gap-2"><PieChart className="w-5 h-5 text-emerald-600 mr-1"/> 選擇飲食比例</h3>
                  
                  <div className="space-y-3">
                    <button onClick={() => setProfile({...profile, dietType: 'standard'})} className={`w-full p-4 rounded-2xl border-2 text-left transition-all ${profile.dietType === 'standard' ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-50 hover:bg-slate-50 bg-slate-50/50'}`}>
                      <div className="font-bold text-slate-700">標準 211 餐盤</div>
                      <div className="text-xs text-slate-500 mt-1">碳水 40-50%，蛋白質依體重計算</div>
                    </button>
                    
                    <button onClick={() => setProfile({...profile, dietType: 'vegetarian'})} className={`w-full p-4 rounded-2xl border-2 text-left transition-all ${profile.dietType === 'vegetarian' ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-50 hover:bg-slate-50 bg-slate-50/50'}`}>
                      <div className="font-bold text-slate-700">素食者 211V</div>
                      <div className="text-xs text-slate-500 mt-1">蛋白質 25%、澱粉 25%、蔬菜 50%</div>
                    </button>

                    <button onClick={() => setProfile({...profile, dietType: 'fat_loss'})} className={`w-full p-4 rounded-2xl border-2 text-left transition-all ${profile.dietType === 'fat_loss' ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-50 hover:bg-slate-50 bg-slate-50/50'}`}>
                      <div className="font-bold text-slate-700">減脂族群 211A (高胰島素阻抗適用)</div>
                      <div className="text-xs text-slate-500 mt-1">蛋白質 30%、澱粉 20%、蔬菜 50%</div>
                    </button>

                    <button onClick={() => setProfile({...profile, dietType: 'custom'})} className={`w-full p-4 rounded-2xl border-2 text-left transition-all ${profile.dietType === 'custom' ? 'border-emerald-500 bg-emerald-50 shadow-sm' : 'border-slate-50 hover:bg-slate-50 bg-slate-50/50'}`}>
                      <div className="font-bold text-slate-700">自行設定比例</div>
                      <div className="text-xs text-slate-500 mt-1">自由調配三大營養素佔比</div>
                    </button>
                  </div>

                  {profile.dietType === 'custom' && (
                    <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                      <div className="grid grid-cols-3 gap-2">
                        <div className="text-center">
                          <label className="text-[11px] font-bold text-blue-600 block mb-1">蛋白質 %</label>
                          <input type="number" className="w-full text-base text-center p-2 rounded-lg border border-blue-200 outline-none focus:ring-1 focus:ring-blue-500" value={profile.customMacros.pro} onChange={(e) => setProfile({...profile, customMacros: {...profile.customMacros, pro: e.target.value}})} />
                        </div>
                        <div className="text-center">
                          <label className="text-[11px] font-bold text-orange-600 block mb-1">澱粉 %</label>
                          <input type="number" className="w-full text-base text-center p-2 rounded-lg border border-orange-200 outline-none focus:ring-1 focus:ring-orange-500" value={profile.customMacros.carb} onChange={(e) => setProfile({...profile, customMacros: {...profile.customMacros, carb: e.target.value}})} />
                        </div>
                        <div className="text-center">
                          <label className="text-[11px] font-bold text-emerald-600 block mb-1">蔬菜 %</label>
                          <input type="number" className="w-full text-base text-center p-2 rounded-lg border border-emerald-200 outline-none focus:ring-1 focus:ring-emerald-500" value={profile.customMacros.veg} onChange={(e) => setProfile({...profile, customMacros: {...profile.customMacros, veg: e.target.value}})} />
                        </div>
                      </div>
                      <div className={`text-xs text-center mt-3 font-bold ${parseFloat(profile.customMacros.pro) + parseFloat(profile.customMacros.carb) + parseFloat(profile.customMacros.veg) === 100 ? 'text-emerald-600' : 'text-red-500'}`}>
                        總和：{parseFloat(profile.customMacros.pro) + parseFloat(profile.customMacros.carb) + parseFloat(profile.customMacros.veg)} %
                      </div>
                    </div>
                  )}

                  <div className="bg-red-50 text-red-600 text-[11px] p-3 rounded-lg flex items-start gap-1.5 mt-2">
                    <AlertTriangle className="w-4 h-4 flex-shrink-0 mt-0.5" />
                    <span><b>警語：</b>非標準之特殊飲食比例，建議尋求專業醫師、營養師協助指導飲食計畫，以免影響健康。</span>
                  </div>
                </div>
              )}

              <div className="mt-10 flex gap-3">
                {step > 1 && (
                  <button onClick={() => setStep(step - 1)} className="flex-1 py-4 rounded-2xl border border-slate-200 font-bold text-slate-600 hover:bg-slate-50">返回</button>
                )}
                {step < 4 ? (
                  <button onClick={() => setStep(step + 1)} className="flex-[2] py-4 rounded-2xl bg-emerald-600 text-white font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 flex items-center justify-center gap-2">下一步 <ChevronRight className="w-5 h-5 ml-1" /></button>
                ) : (
                  <button onClick={handleStart} className="flex-[2] py-4 rounded-2xl bg-emerald-600 text-white font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 flex items-center justify-center gap-2">開始健康選食！ <Save className="w-5 h-5 ml-1" /></button>
                )}
              </div>
            </div>
          </div>
          
          <div className="text-center mt-4 mb-2 flex items-center justify-center gap-2 opacity-60">
            <HeartHandshake className="w-4 h-4 text-slate-500" />
            <p className="text-xs text-slate-500 font-medium tracking-wide">蕭宇超醫師 製作 · 一起告別雲朵身材</p>
          </div>
        </div>
      );
    };

    // ==========================================
    // 4. 系統主程式元件 (MainApp - 雲端版)
    // ==========================================
    const MainApp = ({ onResetProfile }) => {
      const [userQuota, setUserQuota] = useState({ kcal: 600, sod: 800 }); 
      const [macroTargets, setMacroTargets] = useState({ carbMax: 65, proMin: 20, proMax: 45, fibMin: 6 });
      const [searchTerm, setSearchTerm] = useState('');
      
      // 內建的預設備用資料庫 (根據醫師提供最新營養標示更新，並用淨重推估纖維量)
      const DEFAULT_SIDES = [
        // 蛋白質區
        { id: 'ds1', name: '茶葉蛋', cal: 75, pro: 7, fib: 0, sod: 250, carb: 5, price: 13, type: 'protein' },
        { id: 'ds2', name: '統一無糖高纖豆漿', cal: 162, pro: 13.6, fib: 8, sod: 88, carb: 14, price: 20, type: 'protein' },
        { id: 'ds3', name: '舒迷雞胸肉', cal: 136, pro: 24.5, fib: 0, sod: 679, carb: 1, price: 59, type: 'protein' },
        { id: 'ds4', name: '統一AB無糖優酪乳', cal: 119, pro: 6.4, fib: 0, sod: 107, carb: 17.3, price: 28, type: 'protein' },
        { id: 'ds5', name: '石安牧場溫泉蛋', cal: 53, pro: 5.4, fib: 0, sod: 204, carb: 1.4, price: 46, type: 'protein' },
        
        // 纖維區 (以 100g 蔬菜 ≈ 2g 纖維 進行推估，解決廠商未標示問題)
        { id: 'df1', name: '一日野菜-和風海藻', cal: 37, pro: 1.4, fib: 2.6, sod: 101, carb: 6, price: 49, type: 'fiber' }, // 淨重 130g
        { id: 'df2', name: '一日野菜-活力彩蔬', cal: 98, pro: 8.6, fib: 3.5, sod: 86, carb: 14.4, price: 55, type: 'fiber' }, // 淨重 174g
        { id: 'df3', name: '關東煮-白蘿蔔兩塊', cal: 16, pro: 0, fib: 1.0, sod: 120, carb: 0, price: 20, type: 'fiber' }, // 淨重 50g
        { id: 'df4', name: '微波-鹽味毛豆', cal: 97, pro: 7.9, fib: 0, sod: 315, carb: 7.5, price: 39, type: 'fiber' }, 
        { id: 'df5', name: '微波-青花菜', cal: 30, pro: 2, fib: 3, sod: 100, carb: 4, price: 39, type: 'fiber' }, // 保留經典款湊齊5樣
        
        // 點心/飲品區
        { id: 'de1', name: '上等蕉 (1根)', cal: 90, pro: 1.5, fib: 2.0, sod: 0, carb: 23, price: 20, type: 'extra' },
        { id: 'de2', name: 'CityCafe 無糖拿鐵(中)', cal: 150, pro: 8, fib: 0, sod: 100, carb: 10, price: 45, type: 'extra' },
        { id: 'de3', name: '切片蘋果', cal: 55, pro: 0.2, fib: 1.8, sod: 2, carb: 14.5, price: 39, type: 'extra' },
        { id: 'de4', name: '無加糖燕麥奶(290ml)', cal: 128, pro: 2.9, fib: 2.3, sod: 110, carb: 21, price: 35, type: 'extra' },
        { id: 'de5', name: '統一無糖綠茶', cal: 0, pro: 0, fib: 0, sod: 10, carb: 0, price: 20, type: 'extra' },
      ];

      // 雲端資料狀態
      const [mainMeals, setMainMeals] = useState([]);
      const [sideOptions, setSideOptions] = useState(DEFAULT_SIDES); // 預設載入內建清單
      const [isLoadingData, setIsLoadingData] = useState(true);
      const [dataError, setDataError] = useState(null);

      const [selectedMain, setSelectedMain] = useState(null);
      const [mainPortion, setMainPortion] = useState(1);
      const [addedSides, setAddedSides] = useState([]);
      
      const [customMeals, setCustomMeals] = useState([]);
      const [customSides, setCustomSides] = useState([]);
      const [recentMeals, setRecentMeals] = useState([]);
      const [expandedCategories, setExpandedCategories] = useState({});
      const [history, setHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      
      const [customInputMode, setCustomInputMode] = useState(null); 
      const [customMeal, setCustomMeal] = useState({ name: '', cal: '', pro: '', fib: '', sod: '', carb: '', price: '' });
      const [inlineCustom, setInlineCustom] = useState({ name: '', cal: '', pro: '', fib: '', sod: '', carb: '', price: '' });

      // 從 Google Apps Script 抓取資料
      const fetchFoodData = async () => {
        if (!GAS_API_URL || GAS_API_URL.includes('YOUR_GAS_WEB_APP_URL_HERE')) {
          setDataError("尚未設定 Google API 網址。請在程式碼中填入您的 GAS URL。");
          setIsLoadingData(false);
          return;
        }

        setIsLoadingData(true);
        setDataError(null);
        try {
          const response = await fetch(GAS_API_URL);
          if (!response.ok) throw new Error('網路回應錯誤');
          const data = await response.json();
          
          // 自動補全 Google 試算表未填寫的 expert 短評
          const processedData = data.map(item => ({
            ...item,
            expert: item.expert ? item.expert : `💡 系統智能分析：${generateSmartComment(parseFloat(item.carb)||0, parseFloat(item.pro)||0, parseFloat(item.sod)||0, item.type === 'main')}`
          }));
          
          // 根據 type 欄位分類資料
          const mains = processedData.filter(item => item.type === 'main');
          let sides = processedData.filter(item => item.type === 'protein' || item.type === 'fiber' || item.type === 'extra');
          
          setMainMeals(mains);

          // 如果雲端尚未設定任何配菜，則保留內建的 15 款商品
          if(sides.length > 0) {
            setSideOptions(sides);
          }
          
          // 將最新資料存入 localStorage 作為快取
          localStorage.setItem('cached_main_meals', JSON.stringify(mains));
          if(sides.length > 0) localStorage.setItem('cached_side_options', JSON.stringify(sides));
          
        } catch (err) {
          console.error('Fetch error:', err);
          // 如果抓取失敗，嘗試載入快取
          const cachedMains = localStorage.getItem('cached_main_meals');
          const cachedSides = localStorage.getItem('cached_side_options');
          
          if (cachedMains) {
            setMainMeals(JSON.parse(cachedMains));
            if (cachedSides) setSideOptions(JSON.parse(cachedSides));
            setDataError("無法連線至雲端，目前顯示為離線快取資料。");
          } else {
            setDataError("無法載入雲端資料，且無離線快取。請檢查網路或 API 設定。");
          }
        } finally {
          setIsLoadingData(false);
        }
      };

      // 初始化：計算個人目標 & 抓取資料
      useEffect(() => {
        // 1. 設定個人目標
        const savedProfile = localStorage.getItem('health_select_profile');
        if (savedProfile) {
          const profile = JSON.parse(savedProfile);
          const weight = parseFloat(profile.weight);
          const age = parseInt(profile.age);
          
          let bmr = (10 * weight) + (6.25 * profile.height) - (5 * age) + (profile.gender === 'male' ? 5 : -161);
          if (age < 19) bmr = (17.5 * weight) + 651; 
          
          const tdee = bmr * parseFloat(profile.activity);
          const targetKcal = tdee - ((parseFloat(profile.goal) * 7700) / 7);
          const mealKcal = Math.round(targetKcal / 3);
          
          setUserQuota({ kcal: mealKcal, sod: 800 }); 

          let carbMaxCalc, proMinCalc, proMaxCalc, fibMinCalc;
          const dietType = profile.dietType || 'standard';

          if (dietType === 'standard') {
            if (age < 18) {
              carbMaxCalc = Math.round((mealKcal * 0.5) / 4); 
              proMinCalc = Math.round((weight * 1.5) / 3); 
              proMaxCalc = Math.round((weight * 2.5) / 3); 
              fibMinCalc = Math.max(3, Math.round((age + 5) / 3)); 
            } else {
              carbMaxCalc = Math.round((mealKcal * 0.4) / 4); 
              proMinCalc = Math.max(15, Math.round((weight * 1.2) / 3)); 
              proMaxCalc = Math.max(40, Math.round((weight * 2.0) / 3)); 
              fibMinCalc = 6;
            }
          } else {
            let carbPercent, proPercent, vegPercent;
            if (dietType === 'vegetarian') {
              carbPercent = 0.25; proPercent = 0.25; vegPercent = 0.50;
            } else if (dietType === 'fat_loss') {
              carbPercent = 0.20; proPercent = 0.30; vegPercent = 0.50;
            } else if (dietType === 'custom') {
              carbPercent = (parseFloat(profile.customMacros?.carb) || 25) / 100;
              proPercent = (parseFloat(profile.customMacros?.pro) || 25) / 100;
              vegPercent = (parseFloat(profile.customMacros?.veg) || 50) / 100;
            }
            
            carbMaxCalc = Math.round((mealKcal * carbPercent) / 4);
            proMinCalc = Math.round((mealKcal * proPercent) / 4);
            proMaxCalc = proMinCalc + 15; 
            fibMinCalc = age < 18 ? Math.max(3, Math.round((age + 5) / 3)) : 6;
          }

          setMacroTargets({ carbMax: carbMaxCalc, proMin: proMinCalc, proMax: proMaxCalc, fibMin: fibMinCalc });
        }

        // 2. 載入歷史紀錄等本機資料
        const savedCustoms = localStorage.getItem('custom_meals');
        if (savedCustoms) setCustomMeals(JSON.parse(savedCustoms));
        const savedCustomSides = localStorage.getItem('custom_sides');
        if (savedCustomSides) setCustomSides(JSON.parse(savedCustomSides));
        const savedRecents = localStorage.getItem('recent_meals');
        if (savedRecents) setRecentMeals(JSON.parse(savedRecents));
        const savedHistory = localStorage.getItem('meal_history');
        if (savedHistory) setHistory(JSON.parse(savedHistory));

        // 3. 呼叫雲端 API
        fetchFoodData();

      }, []);

      const adjustedMain = selectedMain ? {
        ...selectedMain,
        cal: selectedMain.cal * mainPortion,
        pro: selectedMain.pro * mainPortion,
        fib: selectedMain.fib * mainPortion,
        sod: selectedMain.sod * mainPortion,
        carb: selectedMain.carb * mainPortion,
        price: selectedMain.price * mainPortion
      } : null;

      const totals = {
        cal: (adjustedMain?.cal || 0) + addedSides.reduce((sum, item) => sum + item.cal, 0),
        pro: (adjustedMain?.pro || 0) + addedSides.reduce((sum, item) => sum + item.pro, 0),
        fib: (adjustedMain?.fib || 0) + addedSides.reduce((sum, item) => sum + item.fib, 0),
        sod: (adjustedMain?.sod || 0) + addedSides.reduce((sum, item) => sum + item.sod, 0),
        carb: (adjustedMain?.carb || 0) + addedSides.reduce((sum, item) => sum + item.carb, 0),
        price: (adjustedMain?.price || 0) + addedSides.reduce((sum, item) => sum + item.price, 0),
      };

      const groupedSides = addedSides.reduce((acc, side) => {
        const existing = acc.find(s => s.id === side.id);
        if (existing) { existing.count += 1; } 
        else { acc.push({ ...side, count: 1 }); }
        return acc;
      }, []);

      const getLight = (item) => {
        if (item.sod > 1100 || item.cal > (userQuota.kcal + 100) || item.carb > (macroTargets.carbMax + 15)) return { color: 'bg-red-500', label: '紅燈', text: '負擔較大' };
        if (item.pro >= macroTargets.proMin && item.fib >= macroTargets.fibMin && item.carb <= macroTargets.carbMax && item.sod <= 800) return { color: 'bg-emerald-500', label: '綠燈', text: '均衡優良' };
        return { color: 'bg-yellow-500', label: '黃燈', text: '需要優化' };
      };

      const addSide = (side) => setAddedSides([...addedSides, side]);
      
      const removeSideById = (id) => {
        const index = addedSides.map(s => s.id).lastIndexOf(id);
        if (index !== -1) {
          const newSides = [...addedSides];
          newSides.splice(index, 1);
          setAddedSides(newSides);
        }
      };

      const resetSelection = () => { setSelectedMain(null); setMainPortion(1); setAddedSides([]); setSearchTerm(''); setCustomInputMode(null); setShowHistory(false); };
      const toggleCategory = (category) => setExpandedCategories(prev => ({...prev, [category]: !prev[category]}));

      const handleSelectMain = (meal) => {
        setSelectedMain(meal);
        setMainPortion(1);
        const newRecents = [meal, ...recentMeals.filter(m => m.id !== meal.id)].slice(0, 3);
        setRecentMeals(newRecents);
        localStorage.setItem('recent_meals', JSON.stringify(newRecents));
      };

      const handleCustomSubmit = (e) => {
        e.preventDefault();
        const isMain = customInputMode === 'main';
        const c_carb = parseFloat(customMeal.carb) || 0;
        const c_pro = parseFloat(customMeal.pro) || 0;
        const c_sod = parseFloat(customMeal.sod) || 0;

        const newMeal = {
          id: 'custom_' + Date.now(), 
          category: isMain ? '自訂主餐' : '自訂單點', 
          name: customMeal.name || '自訂美食',
          cal: parseFloat(customMeal.cal) || 0, pro: c_pro,
          fib: parseFloat(customMeal.fib) || 0, sod: c_sod,
          carb: c_carb, price: parseFloat(customMeal.price) || 0,
          type: isMain ? 'main' : 'extra',
          // 手動輸入自動套用智能短評生成器
          expert: `💡 系統智能分析：${generateSmartComment(c_carb, c_pro, c_sod, isMain)}`
        };
        
        if (isMain) {
          const updatedCustoms = [newMeal, ...customMeals];
          setCustomMeals(updatedCustoms);
          localStorage.setItem('custom_meals', JSON.stringify(updatedCustoms));
          handleSelectMain(newMeal);
        } else {
          addSide(newMeal);
          const updatedCustomSides = [newMeal, ...customSides.filter(s => s.name !== newMeal.name)].slice(0, 10);
          setCustomSides(updatedCustomSides);
          localStorage.setItem('custom_sides', JSON.stringify(updatedCustomSides));
        }
        
        setCustomInputMode(null);
        setCustomMeal({name: '', cal: '', pro: '', fib: '', sod: '', carb: '', price: ''});
      };

      const handleInlineCustomAdd = () => {
        if (!inlineCustom.name || !inlineCustom.cal) { alert('請至少填寫「食物名稱」與「熱量」喔！'); return; }
        const newItem = {
          id: 'inline_' + Date.now(), name: inlineCustom.name,
          cal: parseFloat(inlineCustom.cal) || 0, pro: parseFloat(inlineCustom.pro) || 0,
          fib: parseFloat(inlineCustom.fib) || 0, sod: parseFloat(inlineCustom.sod) || 0,
          carb: parseFloat(inlineCustom.carb) || 0, price: parseFloat(inlineCustom.price) || 0, type: 'extra'
        };
        addSide(newItem);
        const updatedCustomSides = [newItem, ...customSides.filter(s => s.name !== newItem.name)].slice(0, 10);
        setCustomSides(updatedCustomSides);
        localStorage.setItem('custom_sides', JSON.stringify(updatedCustomSides));
        setInlineCustom({ name: '', cal: '', pro: '', fib: '', sod: '', carb: '', price: '' });
      };

      const handleCheckout = (isPerfect) => {
        const newRecord = {
          id: 'hist_' + Date.now(), date: new Date().toISOString(), mainName: `${selectedMain.name} (${mainPortion}份)`,
          sides: addedSides.map(s => s.name), totals: { ...totals }, targets: { ...macroTargets }, isPerfect: isPerfect
        };
        const updatedHistory = [newRecord, ...history];
        setHistory(updatedHistory);
        localStorage.setItem('meal_history', JSON.stringify(updatedHistory));
        alert(isPerfect ? '🎉 太棒了！已將這筆完美的餐盤加入您的健康紀錄！' : '📝 已紀錄這筆餐點。下次可以試著多加點蔬菜或減少澱粉喔！');
        resetSelection();
        setShowHistory(true);
      };

      const renderMealItem = (meal) => {
        const light = getLight(meal);
        return (
          <div key={meal.id} onClick={() => handleSelectMain(meal)} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:scale-[0.98] active:bg-slate-50 transition-all hover:border-emerald-200">
            <div className="flex-1 min-w-0 pr-3">
              <div className="flex items-center gap-2 mb-1">
                <span className={`flex-shrink-0 w-3 h-3 rounded-full ${light.color} shadow-sm`}></span>
                <h3 className="font-bold text-slate-700 truncate">{meal.name}</h3>
              </div>
              <div className="text-[11px] text-slate-500 flex flex-wrap gap-x-3 gap-y-1 mt-1">
                <span>🔥 {meal.cal} kcal</span>
                <span className={meal.carb > macroTargets.carbMax ? 'text-orange-500 font-bold' : ''}>🍚 碳水 {meal.carb}g</span>
                <span className={meal.pro < macroTargets.proMin ? 'text-blue-500 font-bold' : ''}>🥩 蛋白 {meal.pro}g</span>
              </div>
            </div>
            <div className="text-slate-400 flex-shrink-0"><ChevronRight className="w-5 h-5" /></div>
          </div>
        );
      };

      // Loading 畫面
      if (isLoadingData) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-sans text-slate-800">
            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center">
              <div className="loader mb-4"></div>
              <h2 className="text-lg font-bold text-emerald-600 mb-1">載入最新鮮食資料中...</h2>
              <p className="text-xs text-slate-400">正在與雲端資料庫同步，請稍候</p>
            </div>
          </div>
        );
      }

      if (customInputMode) {
        const isMain = customInputMode === 'main';
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 font-sans text-slate-800 pb-20">
            <div className="w-full max-w-md">
              <button onClick={() => setCustomInputMode(null)} className="flex items-center text-slate-500 font-medium py-3 mb-2"><ChevronLeft className="w-5 h-5 mr-1" /> 返回</button>
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div className="flex items-center gap-3 mb-6">
                  <div className="bg-emerald-100 p-3 rounded-full text-emerald-600"><Edit className="w-6 h-6" /></div>
                  <div><h2 className="text-xl font-bold text-slate-800">手動輸入{isMain ? '主餐' : '配菜'}</h2><p className="text-xs text-slate-500">輸入包裝標示，系統將自動納入計算</p></div>
                </div>
                <form onSubmit={handleCustomSubmit} className="space-y-4">
                  <div><label className="block text-sm font-semibold text-slate-600 mb-1">商品名稱 (必填)</label><input type="text" required className="w-full text-base p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" value={customMeal.name} onChange={e => setCustomMeal({...customMeal, name: e.target.value})} /></div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="block text-sm font-semibold text-slate-600 mb-1">熱量 (大卡)</label><input type="number" required min="0" className="w-full text-base p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" value={customMeal.cal} onChange={e => setCustomMeal({...customMeal, cal: e.target.value})} /></div>
                    <div><label className="block text-sm font-semibold text-orange-600 mb-1">碳水/糖 (g)</label><input type="number" step="0.1" required min="0" className="w-full text-base p-3 bg-orange-50 border border-orange-200 rounded-xl outline-none" value={customMeal.carb} onChange={e => setCustomMeal({...customMeal, carb: e.target.value})} /></div>
                    <div><label className="block text-sm font-semibold text-blue-600 mb-1">蛋白質 (g)</label><input type="number" step="0.1" required min="0" className="w-full text-base p-3 bg-blue-50 border border-blue-200 rounded-xl outline-none" value={customMeal.pro} onChange={e => setCustomMeal({...customMeal, pro: e.target.value})} /></div>
                    <div><label className="block text-sm font-semibold text-emerald-600 mb-1">膳食纖維 (g)</label><input type="number" step="0.1" min="0" className="w-full text-base p-3 bg-emerald-50 border border-emerald-200 rounded-xl outline-none" value={customMeal.fib} onChange={e => setCustomMeal({...customMeal, fib: e.target.value})} /></div>
                    <div className="col-span-2"><label className="block text-sm font-semibold text-red-600 mb-1 flex items-center gap-1">鈉含量 (mg) <Info className="w-3 h-3 ml-1"/></label><input type="number" required min="0" className="w-full text-base p-3 bg-red-50 border border-red-200 rounded-xl outline-none" value={customMeal.sod} onChange={e => setCustomMeal({...customMeal, sod: e.target.value})} /></div>
                    <div className="col-span-2"><label className="block text-sm font-semibold text-slate-600 mb-1">價格 (元)</label><input type="number" min="0" className="w-full text-base p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" value={customMeal.price} onChange={e => setCustomMeal({...customMeal, price: e.target.value})} /></div>
                  </div>
                  <button type="submit" className="w-full mt-6 bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 active:scale-[0.98]">{isMain ? '儲存並開始分析' : '加入本餐清單'}</button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      if (showHistory) {
        const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
        const weekData = history.filter(h => new Date(h.date).getTime() > oneWeekAgo);
        const totalMeals = weekData.length;
        const perfectMeals = weekData.filter(h => h.isPerfect).length;
        const perfectRate = totalMeals === 0 ? 0 : Math.round((perfectMeals / totalMeals) * 100);
        const avgCarb = totalMeals === 0 ? 0 : Math.round(weekData.reduce((sum, h) => sum + h.totals.carb, 0) / totalMeals);
        const avgSod = totalMeals === 0 ? 0 : Math.round(weekData.reduce((sum, h) => sum + h.totals.sod, 0) / totalMeals);

        let grade = { score: '無', color: 'text-slate-400', bg: 'bg-slate-100' };
        let comment = '目前還沒有足夠的紀錄，快去挑選您的第一餐吧！';

        if (totalMeals > 0) {
          if (perfectRate >= 80) { grade = { score: 'S', color: 'text-emerald-600', bg: 'bg-emerald-100' }; comment = '🏆 飲食大師！您極度自律，完美掌握了進階餐盤的精髓！'; }
          else if (perfectRate >= 50) { grade = { score: 'A', color: 'text-blue-600', bg: 'bg-blue-100' }; comment = '👍 表現優良！若能再稍稍注意澱粉份量，就能達到完美的 S 級囉！'; }
          else if (perfectRate >= 20) {
            grade = { score: 'B', color: 'text-yellow-600', bg: 'bg-yellow-100' };
            if (avgCarb > macroTargets.carbMax + 10) comment = '🤔 碳水危機！下週試著把便當的白飯減半，多拿一顆茶葉蛋。';
            else if (avgSod > 1200) comment = '🧂 鈉量警告！您的選擇通常偏鹹，容易造成水腫，下週記得多喝水。';
            else comment = '📊 正在進步的路上！建議每餐先挑選蔬菜與蛋白質，最後再看澱粉。';
          } else { grade = { score: 'C', color: 'text-red-600', bg: 'bg-red-100' }; comment = '🚨 健康亮紅燈！別灰心，從下一餐「加購一盒生菜沙拉」開始小步改變吧！'; }
        }

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 font-sans text-slate-800 pb-20">
            <div className="w-full max-w-md">
              <button onClick={() => setShowHistory(false)} className="flex items-center text-slate-500 font-medium py-3 mb-2"><ChevronLeft className="w-5 h-5 mr-1" /> 返回首頁</button>
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 relative overflow-hidden">
                <div className={`absolute top-0 right-0 w-24 h-24 rounded-bl-[100px] ${grade.bg} -z-0 opacity-50`}></div>
                <h2 className="text-lg font-bold flex items-center gap-2 mb-4 relative z-10"><Award className={`w-6 h-6 ${grade.color}`} /> 本週成績單</h2>
                <div className="flex items-end gap-4 mb-5 relative z-10">
                  <div className={`text-6xl font-black ${grade.color} drop-shadow-sm`}>{grade.score}</div>
                  <div className="pb-2"><div className="text-sm font-bold text-slate-700">目標達成率</div><div className="text-2xl font-bold text-slate-500">{perfectRate}% <span className="text-xs text-slate-400 font-normal">({perfectMeals}/{totalMeals}餐)</span></div></div>
                </div>
                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-sm text-slate-700 leading-relaxed mb-4">{comment}</div>
                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-orange-50/50 p-3 rounded-xl border border-orange-100 text-center"><div className="text-[10px] text-orange-600 font-bold mb-1">本週平均碳水</div><div className="text-lg font-bold text-slate-700">{avgCarb}<span className="text-xs text-slate-500 ml-1">g</span></div></div>
                  <div className="bg-red-50/50 p-3 rounded-xl border border-red-100 text-center"><div className="text-[10px] text-red-600 font-bold mb-1">本週平均鈉量</div><div className="text-lg font-bold text-slate-700">{avgSod}<span className="text-xs text-slate-500 ml-1">mg</span></div></div>
                </div>
              </div>
              <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2 px-1"><CalendarDays className="w-5 h-5"/> 近期紀錄</h3>
              <div className="space-y-3">
                {weekData.map(record => {
                  const dateObj = new Date(record.date);
                  return (
                    <div key={record.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                      <div className="flex justify-between items-start mb-2"><div className="text-xs text-slate-400 font-medium">{dateObj.getMonth()+1}/{dateObj.getDate()} {dateObj.getHours()}:{dateObj.getMinutes().toString().padStart(2, '0')}</div>{record.isPerfect ? <span className="flex items-center gap-1 text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold"><CheckCircle2 className="w-3 h-3"/> 完美</span> : <span className="flex items-center gap-1 text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-bold">待優化</span>}</div>
                      <h4 className="font-bold text-slate-800 text-sm mb-1">{record.mainName}</h4>
                      {record.sides.length > 0 && <div className="text-xs text-emerald-600 mb-2 font-medium">+ 加點：{record.sides.join('、')}</div>}
                      <div className="flex gap-3 text-[10px] text-slate-500 border-t border-slate-50 pt-2 mt-1"><span>🔥 {record.totals.cal}kcal</span><span>🍚 {record.totals.carb.toFixed(0)}g</span><span>🥩 {record.totals.pro.toFixed(0)}g</span><span>🥗 {record.totals.fib.toFixed(0)}g</span></div>
                    </div>
                  );
                })}
                {weekData.length === 0 && <div className="text-center text-slate-400 py-8 bg-white rounded-2xl border border-dashed border-slate-200">本週尚無紀錄</div>}
              </div>
            </div>
          </div>
        );
      }

      if (!selectedMain) {
        // 使用從 API 抓回來的 mainMeals 取代寫死的 MAIN_MEALS
        const allMeals = [...mainMeals, ...customMeals];
        const groupedMains = allMeals.reduce((acc, meal) => {
          if (!searchTerm || meal.name.includes(searchTerm)) {
            if (!acc[meal.category]) acc[meal.category] = [];
            acc[meal.category].push(meal);
          }
          return acc;
        }, {});

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 font-sans text-slate-800 pb-24">
            <div className="w-full max-w-md">
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-4 relative overflow-hidden">
                <button onClick={onResetProfile} className="absolute top-5 right-5 text-slate-400 hover:text-emerald-600 transition-colors p-2 bg-slate-50 rounded-full" title="重新設定個人資料"><Settings className="w-5 h-5" /></button>
                <h1 className="text-xl font-bold mb-1">您想吃什麼主餐？</h1>
                <p className="text-sm text-slate-500">系統載入專屬目標：單餐 {userQuota.kcal}kcal</p>
                
                {dataError && (
                  <div className="mt-3 bg-red-50 text-red-600 text-[10px] p-2 rounded-lg flex items-center gap-1">
                    <AlertTriangle className="w-3 h-3" /> {dataError}
                  </div>
                )}

                <div className="mt-5 relative mb-3">
                  <Search className="w-5 h-5 absolute left-3 top-3 text-slate-400" />
                  <input type="text" placeholder="搜尋主食 (如：便當, 麵)" className="w-full text-base bg-slate-100 rounded-xl py-3 pl-10 pr-4 outline-none focus:ring-2 focus:ring-emerald-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                </div>
                <button onClick={() => setCustomInputMode('main')} className="w-full bg-emerald-50 border border-emerald-200 text-emerald-700 py-3.5 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-100 active:bg-emerald-200 font-bold text-sm transition-colors">
                  <Edit className="w-4 h-4" /> 找不到商品？輸入主餐標示
                </button>
                <button onClick={() => handleSelectMain({ id: 'blank_' + Date.now(), name: '🍽️ 空白餐盤 (無主餐)', category: '自訂主餐', cal: 0, pro: 0, fib: 0, sod: 0, carb: 0, price: 0, expert: '此為空白基底，請在下方的「自行輸入區」隨意加入您買的各種食物！' })} className="w-full mt-3 bg-blue-50 border border-blue-200 text-blue-700 py-3.5 rounded-xl flex items-center justify-center gap-2 hover:bg-blue-100 active:bg-blue-200 font-bold text-sm shadow-sm transition-colors">
                  <Plus className="w-4 h-4" /> 只買小東西？從空白餐盤組合
                </button>
                <button onClick={() => setShowHistory(true)} className="w-full mt-3 bg-slate-800 text-white py-3.5 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-700 active:bg-slate-900 font-bold text-sm shadow-md transition-colors">
                  <TrendingUp className="w-4 h-4" /> 查看本週健康成績單
                </button>
                
                <button onClick={fetchFoodData} className="w-full mt-3 text-slate-400 py-2 rounded-xl flex items-center justify-center gap-1 hover:bg-slate-100 hover:text-slate-600 text-xs font-medium transition-colors">
                  <RefreshCw className="w-3 h-3" /> 從雲端更新商品清單
                </button>
              </div>

              {recentMeals.length > 0 && !searchTerm && (
                <div className="mb-6"><h2 className="flex items-center gap-2 text-sm font-bold text-slate-500 mb-3 px-1"><Clock className="w-4 h-4 mr-1" /> 最近吃過</h2><div className="space-y-3">{recentMeals.map(meal => renderMealItem(meal))}</div></div>
              )}

              <div className="mb-6">
                <h2 className="flex items-center gap-2 text-sm font-bold text-slate-500 mb-3 px-1"><ListFilter className="w-4 h-4 mr-1" /> 商品總覽</h2>
                <div className="space-y-4">
                  {Object.keys(groupedMains).map(category => {
                    const isExpanded = searchTerm !== '' || expandedCategories[category];
                    return (
                      <div key={category} className="bg-slate-100/50 rounded-2xl overflow-hidden border border-slate-200/60">
                        <button onClick={() => toggleCategory(category)} className="w-full px-4 py-4 flex items-center justify-between bg-white text-slate-700 font-bold active:bg-slate-50">
                          <div className="flex items-center gap-2"><span>{category}</span><span className="bg-slate-100 text-slate-500 text-[10px] px-2 py-0.5 rounded-full">{groupedMains[category].length}</span></div>
                          {isExpanded ? <ChevronUp className="w-4 h-4 text-slate-400"/> : <ChevronDown className="w-4 h-4 text-slate-400"/>}
                        </button>
                        {isExpanded && <div className="p-3 space-y-3">{groupedMains[category].map(meal => renderMealItem(meal))}</div>}
                      </div>
                    );
                  })}
                  {Object.keys(groupedMains).length === 0 && <div className="text-center text-slate-400 py-8">找不到符合的商品</div>}
                </div>
              </div>

              <div className="mt-6 mb-2 py-4 px-5 bg-white border border-slate-200 rounded-2xl flex items-center justify-between shadow-sm">
                <div>
                  <h3 className="font-bold text-slate-700 text-sm flex items-center gap-1.5">
                    <HeartHandshake className="w-4 h-4 text-emerald-600" />
                    蕭宇超醫師 製作
                  </h3>
                  <p className="text-xs text-slate-500 mt-0.5">一起告別雲朵身材 ☁️</p>
                </div>
                <div className="flex items-center gap-2.5">
                  <a href="https://www.facebook.com/share/1FoPpvVSZs/?mibextid=wwXIfr" target="_blank" rel="noreferrer" className="text-[#1877F2] bg-blue-50 p-2 rounded-full hover:bg-blue-100 active:scale-95 transition-all" title="Facebook 粉絲專頁">
                    <FacebookLogo className="w-5 h-5" />
                  </a>
                  <a href="https://www.instagram.com/goodbyecloudkids_drhsiao?igsh=cWhkZXhwcjNoZnpm&utm_source=qr" target="_blank" rel="noreferrer" className="text-[#E4405F] bg-pink-50 p-2 rounded-full hover:bg-pink-100 active:scale-95 transition-all" title="Instagram">
                    <InstagramLogo className="w-5 h-5" />
                  </a>
                  <a href="https://lin.ee/fAzcScx" target="_blank" rel="noreferrer" className="text-[#06C755] bg-[#e6f9ed] p-2 rounded-full hover:bg-[#d1f2de] active:scale-95 transition-all" title="LINE 官方帳號">
                    <LineLogo className="w-5 h-5" />
                  </a>
                </div>
              </div>

            </div>
          </div>
        );
      }

      const mainLight = getLight(adjustedMain);
      const needProtein = totals.pro < macroTargets.proMin;
      const excessProtein = totals.pro > macroTargets.proMax; 
      const needFiber = totals.fib < macroTargets.fibMin;
      const excessCarb = totals.carb > macroTargets.carbMax;   
      const sodWarning = totals.sod > 1200;
      const isPerfect211 = !needProtein && !excessProtein && !needFiber && !excessCarb;

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 font-sans text-slate-800 pb-[280px]">
          <div className="w-full max-w-md space-y-4">
            <button onClick={resetSelection} className="flex items-center text-slate-500 font-medium py-3"><ChevronLeft className="w-5 h-5 mr-1" /> 重新選擇主食</button>

            <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 relative overflow-hidden">
              <div className={`absolute top-0 left-0 w-2 h-full ${mainLight.color}`}></div>
              <div className="pl-4">
                <div className="flex justify-between items-start mb-2">
                  <h2 className="text-xl font-bold leading-tight pr-2">{selectedMain.name}</h2>
                  <span className={`flex-shrink-0 ml-2 text-xs px-2 py-1 rounded-md text-white font-bold ${mainLight.color}`}>{mainLight.label}</span>
                </div>
                
                {/* 系統自動防呆：視覺化警告標籤區 */}
                <div className="flex flex-wrap gap-1.5 mb-3">
                  {selectedMain.carb > 80 && <span className="bg-orange-100 text-orange-700 text-[10px] px-2 py-0.5 rounded font-bold border border-orange-200">⚠️ 高碳水</span>}
                  {selectedMain.sod > 1000 && <span className="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded font-bold border border-red-200">⚠️ 高鈉預警</span>}
                  {selectedMain.pro < 15 && selectedMain.category !== '輕食' && <span className="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold border border-blue-200">⚠️ 低蛋白</span>}
                </div>

                <div className="mt-3 mb-2 flex items-center gap-3 bg-slate-50 p-2.5 rounded-xl border border-slate-200 w-max">
                  <span className="text-xs font-bold text-slate-500 ml-1">食用份量</span>
                  <div className="flex items-center">
                    <button onClick={() => setMainPortion(Math.max(0.5, mainPortion - 0.5))} className="w-8 h-8 flex items-center justify-center bg-white rounded-md shadow-sm text-slate-600 hover:bg-slate-100 active:bg-slate-200 font-bold text-lg">-</button>
                    <span className="text-sm font-black text-slate-700 w-14 text-center">{mainPortion} 份</span>
                    <button onClick={() => setMainPortion(mainPortion + 0.5)} className="w-8 h-8 flex items-center justify-center bg-white rounded-md shadow-sm text-slate-600 hover:bg-slate-100 active:bg-slate-200 font-bold text-lg">+</button>
                  </div>
                </div>
                {selectedMain.expert && (
                  <div className="bg-slate-50 rounded-xl p-3 mt-3 border border-slate-100 flex gap-2 items-start"><Zap className="w-5 h-5 text-yellow-500 flex-shrink-0 mt-0.5" /><p className="text-sm text-slate-600 leading-relaxed">{selectedMain.expert}</p></div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
              <h3 className="font-bold mb-4 flex items-center gap-2"><Utensils className="w-5 h-5 text-slate-500"/> 專屬飲食比例分析</h3>
              <div className="space-y-5">
                <div>
                  <div className="flex justify-between text-xs mb-1"><span className="font-semibold text-orange-700">🍚 碳水/澱粉 (個人上限 {macroTargets.carbMax}g)</span><span className={excessCarb ? 'text-red-500 font-bold' : 'text-orange-600 font-bold'}>{totals.carb.toFixed(1)}g</span></div>
                  <div className="h-3 bg-slate-100 rounded-full overflow-hidden flex">
                    <div className={`transition-all duration-500 ${excessCarb ? 'bg-red-400' : 'bg-orange-300'}`} style={{ width: `${Math.min((adjustedMain.carb/macroTargets.carbMax)*100, 100)}%` }}></div>
                    {addedSides.map((s, i) => s.carb > 0 && <div key={i} className={`border-l border-white/30 transition-all duration-500 ${excessCarb ? 'bg-red-500' : 'bg-orange-400'}`} style={{ width: `${(s.carb/macroTargets.carbMax)*100}%` }}></div>)}
                  </div>
                  {excessCarb && <p className="text-[10px] text-red-500 mt-1.5 flex items-center gap-1"><AlertTriangle className="w-3 h-3"/> 澱粉超標！破壞比例，建議減少份量。</p>}
                </div>
                <div>
                  <div className="flex justify-between text-xs mb-1"><span className="font-semibold text-blue-700">🥩 蛋白質 (個人目標 {macroTargets.proMin}-{macroTargets.proMax}g)</span><span className={excessProtein ? 'text-red-500 font-bold' : (!needProtein ? 'text-emerald-500 font-bold' : 'text-slate-500')}>{totals.pro.toFixed(1)}g</span></div>
                  <div className="h-3 bg-slate-100 rounded-full overflow-hidden flex">
                    <div className={`transition-all duration-500 ${excessProtein ? 'bg-red-400' : 'bg-blue-300'}`} style={{ width: `${Math.min((adjustedMain.pro/macroTargets.proMax)*100, 100)}%` }}></div>
                    {addedSides.map((s, i) => s.pro > 0 && <div key={i} className={`border-l border-white/30 transition-all duration-500 ${excessProtein ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${(s.pro/macroTargets.proMax)*100}%` }}></div>)}
                  </div>
                  {excessProtein && <p className="text-[10px] text-red-500 mt-1.5 flex items-center gap-1"><AlertTriangle className="w-3 h-3"/> 蛋白質單餐吸收已達上限。</p>}
                </div>
                <div>
                  <div className="flex justify-between text-xs mb-1"><span className="font-semibold text-emerald-700">🥗 膳食纖維 (目標至少 {macroTargets.fibMin}g)</span><span className={!needFiber ? 'text-emerald-500 font-bold' : 'text-slate-500'}>{totals.fib.toFixed(1)}g</span></div>
                  <div className="h-3 bg-slate-100 rounded-full overflow-hidden flex">
                    <div className="bg-emerald-300 transition-all duration-500" style={{ width: `${Math.min((adjustedMain.fib/macroTargets.fibMin)*100, 100)}%` }}></div>
                    {addedSides.map((s, i) => s.fib > 0 && <div key={i} className="bg-emerald-500 border-l border-white/30 transition-all duration-500" style={{ width: `${(s.fib/macroTargets.fibMin)*100}%` }}></div>)}
                  </div>
                </div>
                {sodWarning && <div className="flex items-center gap-2 text-xs text-red-600 bg-red-50 p-2.5 rounded-xl mt-3"><AlertCircle className="w-4 h-4" /> 總鈉量達 {totals.sod}mg，多喝水！</div>}
              </div>
            </div>

            <div className="space-y-4">
              <div className={`p-4 rounded-3xl border transition-colors ${needProtein && !excessProtein ? 'bg-blue-50/50 border-blue-100' : 'bg-slate-50 border-slate-200'}`}>
                <h3 className={`text-sm font-bold mb-3 flex items-center gap-1 ${needProtein && !excessProtein ? 'text-blue-800' : 'text-slate-600'}`}>💪 {needProtein && !excessProtein ? '建議補足蛋白質' : '蛋白質單點區 (已達標)'}</h3>
                <div className="flex overflow-x-auto pb-2 gap-3 snap-x no-scrollbar">
                  {/* 使用從 API 抓回來的 sideOptions 過濾 */}
                  {sideOptions.filter(s => s.type === 'protein').map(side => (
                    <div key={side.id} className={`snap-start flex-shrink-0 w-32 bg-white border rounded-2xl p-3 flex flex-col justify-between shadow-sm ${needProtein && !excessProtein ? 'border-blue-100' : 'border-slate-200'}`}>
                      <div><div className="text-xs font-bold text-slate-700 mb-1">{side.name}</div><div className={`text-[10px] font-medium ${needProtein && !excessProtein ? 'text-blue-500' : 'text-slate-400'}`}>+{side.pro}g 蛋白</div></div>
                      <button onClick={() => addSide(side)} className={`mt-3 w-full py-2 text-xs font-bold rounded-xl flex justify-center items-center gap-1 active:scale-[0.98] transition-all ${needProtein && !excessProtein ? 'bg-blue-50 text-blue-600 hover:bg-blue-100' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><Plus className="w-3 h-3" /> 加點</button>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className={`p-4 rounded-3xl border transition-colors ${needFiber ? 'bg-emerald-50/50 border-emerald-100' : 'bg-slate-50 border-slate-200'}`}>
                <h3 className={`text-sm font-bold mb-3 flex items-center gap-1 ${needFiber ? 'text-emerald-800' : 'text-slate-600'}`}>🥗 {needFiber ? '建議補足膳食纖維' : '膳食纖維單點區 (已達標)'}</h3>
                <div className="flex overflow-x-auto pb-2 gap-3 snap-x no-scrollbar">
                  {sideOptions.filter(s => s.type === 'fiber').map(side => (
                    <div key={side.id} className={`snap-start flex-shrink-0 w-32 bg-white border rounded-2xl p-3 flex flex-col justify-between shadow-sm ${needFiber ? 'border-emerald-100' : 'border-slate-200'}`}>
                      <div><div className="text-xs font-bold text-slate-700 mb-1">{side.name}</div><div className={`text-[10px] font-medium ${needFiber ? 'text-emerald-500' : 'text-slate-400'}`}>+{side.fib}g 纖維</div></div>
                      <button onClick={() => addSide(side)} className={`mt-3 w-full py-2 text-xs font-bold rounded-xl flex justify-center items-center gap-1 active:scale-[0.98] transition-all ${needFiber ? 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><Plus className="w-3 h-3" /> 加點</button>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className="bg-slate-100/50 p-4 rounded-3xl border border-slate-200/60">
                <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1"><Coffee className="w-4 h-4"/> 飲品/水果/點心</h3>
                <div className="flex overflow-x-auto pb-2 gap-3 snap-x no-scrollbar">
                  {sideOptions.filter(s => s.type === 'extra').map(side => (
                    <div key={side.id} className="snap-start flex-shrink-0 w-32 bg-white border border-slate-200 rounded-2xl p-3 flex flex-col justify-between shadow-sm">
                      <div><div className="text-xs font-bold text-slate-700 mb-1 leading-tight">{side.name}</div><div className="text-[10px] text-orange-500 font-medium">{side.carb > 0 ? `+${side.carb}g 碳水` : `${side.cal} kcal`}</div></div>
                      <button onClick={() => addSide(side)} className="mt-3 w-full py-2 bg-slate-50 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-100 active:scale-[0.98] flex justify-center items-center gap-1 transition-all"><Plus className="w-3 h-3" /> 加點</button>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className="bg-purple-50/50 p-4 rounded-3xl border border-purple-100 mt-2">
                <h3 className="text-sm font-bold text-purple-800 mb-2 flex items-center gap-1"><Edit className="w-4 h-4"/> 手動輸入食物</h3>
                <p className="text-[10px] text-purple-600 mb-3 leading-tight">買了清單外的小東西？輸入後按加入即可無限疊加。</p>
                
                {customSides.length > 0 && (
                  <div className="mb-3">
                    <div className="flex overflow-x-auto pb-1 gap-2 snap-x no-scrollbar">
                      {customSides.map(side => (
                        <span key={side.id} onClick={() => addSide(side)} className="snap-start flex-shrink-0 bg-white border border-purple-200 text-purple-700 text-xs px-3 py-2 rounded-xl shadow-sm cursor-pointer hover:bg-purple-100 active:scale-[0.98] flex items-center gap-1 transition-all">
                          <Plus className="w-3 h-3" /> {side.name}
                        </span>
                      ))}
                    </div>
                  </div>
                )}

                <div className="space-y-2">
                  <input type="text" placeholder="食物名稱 (必填)" className="w-full text-base p-3 bg-white border border-purple-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" value={inlineCustom.name} onChange={e => setInlineCustom({...inlineCustom, name: e.target.value})} />
                  <div className="grid grid-cols-3 gap-2">
                    <input type="number" placeholder="熱量(kcal)" className="w-full text-base p-2.5 bg-white border border-purple-200 rounded-xl outline-none text-center placeholder:text-xs" value={inlineCustom.cal} onChange={e => setInlineCustom({...inlineCustom, cal: e.target.value})} />
                    <input type="number" placeholder="碳水(g)" className="w-full text-base p-2.5 bg-white border border-purple-200 rounded-xl outline-none text-center placeholder:text-xs" value={inlineCustom.carb} onChange={e => setInlineCustom({...inlineCustom, carb: e.target.value})} />
                    <input type="number" placeholder="蛋白質(g)" className="w-full text-base p-2.5 bg-white border border-purple-200 rounded-xl outline-none text-center placeholder:text-xs" value={inlineCustom.pro} onChange={e => setInlineCustom({...inlineCustom, pro: e.target.value})} />
                    <input type="number" placeholder="纖維(g)" className="w-full text-base p-2.5 bg-white border border-purple-200 rounded-xl outline-none text-center placeholder:text-xs" value={inlineCustom.fib} onChange={e => setInlineCustom({...inlineCustom, fib: e.target.value})} />
                    <input type="number" placeholder="鈉(mg)" className="w-full text-base p-2.5 bg-white border border-purple-200 rounded-xl outline-none text-center placeholder:text-xs" value={inlineCustom.sod} onChange={e => setInlineCustom({...inlineCustom, sod: e.target.value})} />
                    <input type="number" placeholder="價格($)" className="w-full text-base p-2.5 bg-white border border-purple-200 rounded-xl outline-none text-center placeholder:text-xs" value={inlineCustom.price} onChange={e => setInlineCustom({...inlineCustom, price: e.target.value})} />
                  </div>
                  <button onClick={handleInlineCustomAdd} className="w-full mt-2 py-3 bg-purple-600 text-white text-sm font-bold rounded-xl hover:bg-purple-700 active:scale-[0.98] flex justify-center items-center gap-1 shadow-sm transition-all"><Plus className="w-4 h-4" /> 加入清單</button>
                </div>
              </div>
            </div>
          </div>

          <div className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-10" style={{ paddingBottom: 'max(1rem, env(safe-area-inset-bottom))' }}>
            <div className="max-w-md mx-auto">
              {groupedSides.length > 0 && (
                <div className="flex gap-2 overflow-x-auto mb-3 pb-1 no-scrollbar">
                  {groupedSides.map((side, i) => (
                    <span key={i} className="bg-slate-100 text-xs px-3 py-2 rounded-xl flex items-center gap-1.5 whitespace-nowrap shadow-sm border border-slate-200/50">
                      <span className="font-medium text-slate-700">{side.name}</span>
                      {side.count > 1 && <span className="text-emerald-600 font-bold bg-emerald-100 px-2 py-0.5 rounded-lg">x{side.count}</span>}
                      <X className="w-4 h-4 text-slate-400 cursor-pointer hover:text-red-500 ml-1" onClick={() => removeSideById(side.id)}/>
                    </span>
                  ))}
                </div>
              )}
              <div className="flex justify-between items-end">
                <div><div className="text-xs text-slate-500 mb-1">總計 (建議 {userQuota.kcal}kcal)</div><div className="flex items-baseline gap-2"><span className={`text-2xl font-black ${totals.cal > userQuota.kcal ? 'text-red-500' : 'text-slate-800'}`}>{totals.cal}</span><span className="text-xs text-slate-500">kcal</span></div></div>
                <div className="text-right"><div className="text-xs text-slate-500 mb-1">金額</div><div className="text-xl font-bold text-slate-700">${totals.price}</div></div>
              </div>
              {isPerfect211 ? (
                <button onClick={() => handleCheckout(true)} className="w-full mt-3 bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 hover:bg-emerald-700 active:scale-[0.98] transition-all"><CheckCircle2 className="w-5 h-5" /> 完美餐盤！紀錄並結帳</button>
              ) : (
                <button onClick={() => handleCheckout(false)} className="w-full mt-3 bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md flex justify-center items-center gap-2 hover:bg-slate-700 active:scale-[0.98] transition-all"><ShoppingBag className="w-5 h-5" /> {excessCarb ? '澱粉過多，紀錄這餐 (少吃白飯)' : (excessProtein ? '蛋白超量，紀錄這餐' : '尚未達標，紀錄就這樣吃')}</button>
              )}
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [hasOnboarded, setHasOnboarded] = useState(true); 
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        const saved = localStorage.getItem('health_select_profile');
        if (!saved) setHasOnboarded(false);
        setIsLoading(false);
      }, []);

      if (isLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50">載入中...</div>;

      return hasOnboarded ? <MainApp onResetProfile={() => setHasOnboarded(false)} /> : <OnboardingScreen onComplete={() => setHasOnboarded(true)} />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
